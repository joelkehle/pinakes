services:
  bus:
    image: ghcr.io/joelkehle/pinakes:${PINAKES_TAG:?set PINAKES_TAG to an approved released tag}
    restart: unless-stopped
    # OOM-killed repeatedly on 2026-06-09/10 before pinakes v0.3.0 shipped
    # event retention. The Docker cap is a hard backstop; GOMEMLIMIT makes the
    # Go GC press back before the kernel kills the process.
    mem_limit: ${BUS_MEMORY_LIMIT:?set BUS_MEMORY_LIMIT from the host inventory}
    # v0.3.0 drains HTTP for up to 10s on SIGTERM before closing the store;
    # give it headroom past Docker's 10s default so shutdown stays graceful.
    stop_grace_period: 15s
    ports:
      - "${BUS_PORT:?set BUS_PORT from the host inventory}:8080"
    environment:
      PORT: "8080"
      GOMEMLIMIT: ${GOMEMLIMIT:?set GOMEMLIMIT from the host inventory}
      DB_PATH: ${PINAKES_DB_PATH:?set PINAKES_DB_PATH from the host inventory}
      STATE_FILE: /data/state.json
      ALLOWLIST_FILE: /etc/pinakes/allowlist.txt
      INJECT_TOKENS: ${PINAKES_INJECT_TOKEN:?set PINAKES_INJECT_TOKEN in the deploying shell}
      OBSERVE_TOKENS: ${PINAKES_OBSERVE_TOKEN:?set PINAKES_OBSERVE_TOKEN in the deploying shell}
    volumes:
      - bus-data:/data
      - ${MANAGER_CONFIG_DIR:?set MANAGER_CONFIG_DIR to the manager ops config directory}:/etc/pinakes:ro
    networks:
      agentnet:
        aliases:
          - bus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  bus-data:
    name: ${BUS_DATA_VOLUME:?set BUS_DATA_VOLUME to the exact existing volume name}
    external: true

networks:
  agentnet:
    name: ${STACK_NETWORK_NAME:?set STACK_NETWORK_NAME to the exact existing network name}
    external: true
